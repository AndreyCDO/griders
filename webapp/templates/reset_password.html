{% extends "base.html" %}
{% block title %}{{ ui.auth.new_password_title }} · {{ app_name }}{% endblock %}
{% block content %}
<section class="auth-wrap">
  <form class="auth-box" method="post" action="/password/reset">
    <h1>{{ ui.auth.new_password_title }}</h1>
    {% if error %}<p class="alert">{{ error }}</p>{% endif %}
    <input type="hidden" name="token" value="{{ token }}">
    <label>{{ ui.auth.new_password }}<input name="password" type="password" minlength="8" required autocomplete="new-password"></label>
    <button class="button primary full" type="submit">{{ ui.auth.new_password_button }}</button>
  </form>
</section>
{% endblock %}
